// cb_fm_protos/topics/container.proto
//
// Topic: /dashfabric/v1/config/containers/<container_id>   (compacted)
// DASH lineage: none (FM-extension)
//
// Symmetric to vm.proto for the Container-tier appliance form.

syntax = "proto3";

package dashfabric.cb.v1;

option go_package = "github.com/dashfabric/cb-fm-protos/topics;cbtopics";

import "common/annotations.proto";

message ContainerConfig {
  option (dash_table) = "";              // FM-extension
  option (proto_major) = 1;

  string container_id = 1 [(field) = UPSTREAM, canonical = true];
  string pod_id       = 2 [(field) = UPSTREAM]; // optional, K8s only
  string namespace    = 3 [(field) = UPSTREAM]; // optional, K8s only
  string host_id      = 4 [(field) = UPSTREAM, canonical = true];
  string dpu_id       = 5 [(field) = UPSTREAM];

  string image        = 10 [(field) = UPSTREAM];
  uint32 vcpu         = 11 [(field) = UPSTREAM];
  uint64 mem_bytes    = 12 [(field) = UPSTREAM];

  ContainerLifecycle lifecycle = 20 [(field) = UPSTREAM];

  repeated string eni_ids = 30 [(field) = UPSTREAM];

  // Envelope.
  string tenant   = 50 [(field) = ENVELOPE];
  string region   = 51 [(field) = ENVELOPE];
  string fabric_id = 52 [(field) = ENVELOPE];
  string customer = 53 [(field) = ENVELOPE];
}

enum ContainerLifecycle {
  CONTAINER_LIFECYCLE_UNSPECIFIED = 0;
  CONTAINER_PENDING    = 1;
  CONTAINER_RUNNING    = 2;
  CONTAINER_STOPPED    = 3;
  CONTAINER_TERMINATED = 4;
}
