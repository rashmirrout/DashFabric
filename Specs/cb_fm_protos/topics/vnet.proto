// cb_fm_protos/topics/vnet.proto
//
// Topic: /dashfabric/v1/config/vnets/<vnet_id>       (compacted)
// DASH lineage: DASH_VNET_TABLE

syntax = "proto3";

package dashfabric.cb.v1;

option go_package = "github.com/dashfabric/cb-fm-protos/topics;cbtopics";

import "common/annotations.proto";
import "common/dash_types.proto";

message VnetConfig {
  option (dash_table) = "DASH_VNET_TABLE";
  option (proto_major) = 1;

  string    vnet_id        = 1 [(field) = UPSTREAM, canonical = true];
  uint32    vni            = 2 [(field) = UPSTREAM, canonical = true,
                                (dash_attr) = "SAI_VNET_ATTR_VNI"];
  EncapType encap_type     = 3 [(field) = UPSTREAM, canonical = true];

  // Address space(s) of the overlay.
  repeated IpPrefix address_spaces = 4 [(field) = UPSTREAM, canonical = true];

  // Optional default outbound routing group (vendor-specified).
  string default_route_group_id = 5 [(field) = UPSTREAM];

  // Peered VNETs — FM subscribes to all peer VNETs' resources on peering declaration.
  // A VNET can reach these peers via ROUTE_VNET actions in its route groups.
  repeated string peer_vnet_ids = 6 [(field) = UPSTREAM, canonical = true];

  // Envelope.
  string tenant   = 50 [(field) = ENVELOPE];
  string region   = 51 [(field) = ENVELOPE];
  string fabric_id = 52 [(field) = ENVELOPE];
}
